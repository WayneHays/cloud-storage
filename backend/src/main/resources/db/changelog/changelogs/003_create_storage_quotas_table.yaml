databaseChangeLog:
  - changeSet:
      id: create-storage-quotas-table
      author: waynehays
      changes:
        - createTable:
            tableName: storage_quotas
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_storage_quota_user
                    references: users(id)
              - column:
                  name: used_space
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: storage_limit
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
        - addUniqueConstraint:
            tableName: storage_quotas
            columnNames: user_id
            constraintName: uq_storage_quota_user_id
        - sql:
            comment: "Used space must be non-negative"
            sql: >
              ALTER TABLE storage_quotas
              ADD CONSTRAINT chk_used_space_non_negative CHECK (used_space >= 0);
        - sql:
            comment: "Storage limit must be > 0"
            sql: >
              ALTER TABLE storage_quotas
              ADD CONSTRAINT chk_storage_limit_min CHECK (storage_limit > 0);
        - sql:
            comment: "Storage limit must be < 10GB"
            sql: >
              ALTER TABLE storage_quotas
              ADD CONSTRAINT chk_storage_limit_max CHECK (storage_limit <= 100::bigint * 1024 * 1024 * 1024)