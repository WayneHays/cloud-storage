spring:
  application:
    name: cloud-file-storage
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  servlet:
    multipart:
      max-file-size: ${resource.limits.max-file-size}
      max-request-size: ${resource.limits.max-file-size}
  session:
    timeout: 30m
  cache:
    type: caffeine
    cache-names: rate-limit-buckets
    caffeine:
      spec: expireAfterAccess=5m

server:
  tomcat:
    max-part-count: 1000
    max-swallow-size: -1
    connection-timeout: 300000

cleanup:
  interval: 30m
  limit: 50

reconciliation:
  interval: 1h
  batch-size: 10

search:
  limit: 100

storage-quota:
  default-limit: 1GB

executors:
  upload-thread-pool-size: 10

resource:
  limits:
    max-path-length: 500
    max-filename-length: 255
    max-file-size: 500MB

bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-buckets
      filter-order: 100
      url: /api/resource
      http-response-body: '{"message": "Too many requests"}'
      rate-limits:
        - cache-key: "@rateLimitKeyResolver.userId()"
          execute-predicates:
            - "METHOD=POST"
          bandwidths:
            - capacity: 60
              time: 1
              unit: minutes
              refill-speed: greedy

resilience4j:
  retry:
    instances:
      minioStorage:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - com.waynehays.cloudfilestorage.infrastructure.storage.exception.ResourceStorageTransientException
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  circuitbreaker:
    instances:
      minioStorage:
        sliding-window-type: count_based
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        record-exceptions:
          - com.waynehays.cloudfilestorage.infrastructure.storage.exception.ResourceStorageTransientException
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS, Europe/Moscow} %5level --- [%15.15t] %-40.40logger{39} :%replace( [userId=%X{userId}]){' \\[userId=\\]', ''} %msg%n"
  level:
    root: INFO
    org.hibernate.orm.jdbc.error: OFF