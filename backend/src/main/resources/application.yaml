spring:
  application:
    name: cloud-file-storage
  profiles:
    default: dev
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 50

archive:
  buffer-size: 8192

cleanup:
    interval: 5m
    limit: 50

search:
  limit: 100

user:
  storage:
    default-limit: 1GB
    reconciliation-interval: 30m
    reconciliation-batch-size: 10

executors:
  move-thread-pool-size: 10
  upload-thread-pool-size: 10

path:
  limits:
    max-path-length: 500
    max-filename-length: 255

rate-limit:
  rules:
    - endpoint: "/api/resource"
      http-method: "POST"
      capacity: 60
      tokens-per-minute: 60
    - endpoint: "/api/resource"
      http-method: "GET"
      capacity: 10
      tokens-per-minute: 10
  bucket-expiration: 5m

resilience4j:
  retry:
    instances:
      minioStorage:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - com.waynehays.cloudfilestorage.exception.ResourceStorageTransientException
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  circuit-breaker:
    instances:
      minioStorage:
        sliding-window-type: count_based
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        record-exceptions:
          - com.waynehays.cloudfilestorage.exception.ResourceStorageTransientException
management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

