spring:
  application:
    name: cloud-file-storage
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: validate
  servlet:
    multipart:
      max-file-size: ${resource.limits.max-file-size}
      max-request-size: ${resource.limits.max-file-size}
  session:
    timeout: 30m

server:
  tomcat:
    max-part-count: 1000
    max-swallow-size: -1
    connection-timeout: 300000

cleanup:
  interval: 30m
  limit: 50

search:
  limit: 100

storage-quota:
  default-limit: 1GB
  reconciliation-interval: 1h
  reconciliation-batch-size: 10

executors:
  move-thread-pool-size: 10
  upload-thread-pool-size: 10

resource:
  limits:
    max-path-length: 500
    max-filename-length: 255
    max-file-size: 500MB

rate-limit:
  rules:
    - endpoint: "/api/resource"
      http-method: "POST"
      capacity: 60
      tokens-per-minute: 60
    - endpoint: "/api/resource"
      http-method: "GET"
      capacity: 10
      tokens-per-minute: 10
  bucket-expiration: 5m

resilience4j:
  retry:
    instances:
      minioStorage:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - com.waynehays.cloudfilestorage.shared.exception.ResourceStorageTransientException
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  circuitbreaker:
    instances:
      minioStorage:
        sliding-window-type: count_based
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        record-exceptions:
          - com.waynehays.cloudfilestorage.shared.exception.ResourceStorageTransientException
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS,Europe/Moscow
  level:
    root: INFO