spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dev-db
    username: dev-user
    password: dev-password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
minio:
  security:
    url: http://localhost:9000
    accessKey: minioadmin
    secretKey: minioadmin123
  storage:
    bucketName: dev-bucket
logging:
  level:
    root: info