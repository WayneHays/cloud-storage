databaseChangeLog:
  - changeSet:
      id: create-file-info-table
      author: waynehays
      changes:
        - createTable:
            tableName: files_info
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(260)
                  constraints:
                    nullable: false
              - column:
                  name: storage_key
                  type: varchar(260)
                  constraints:
                    nullable: false
              - column:
                  name: size
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: true
        - addUniqueConstraint:
            constraintName: unique_user_id_name
            tableName: files_info
            columnNames: user_id, name
        - addForeignKeyConstraint:
            baseTableName: files_info
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_files_info_user_id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_files_info_user_id
            tableName: files_info
            columns:
              - column:
                  name: user_id

