databaseChangeLog:
  - changeSet:
      id: add-created-at-updated-at-to-users-table
      author: waynehays
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIMEZONE
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIMEZONE
                  constraints:
                    nullable: false
                  defaultValueComputed: now()

