databaseChangeLog:
  - changeSet:
      id: add-updated-at-to-resource-metadata
      author: waynehays
      changes:
        - addColumn:
            tableName: resource_metadata
            columns:
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIMEZONE
                  constraints:
                    nullable: false
                  defaultValueComputed: now()


