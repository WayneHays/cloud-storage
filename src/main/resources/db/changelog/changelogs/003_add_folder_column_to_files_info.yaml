databaseChangeLog:
  - changeSet:
      id: add-folder-column
      author: waynehays
      changes:
        - addColumn:
            tableName: files_info
            columns:
              - column:
                  name: folder
                  type: varchar(400)
                  constraints:
                    nullable: false
                  defaultValue: "/"
        - dropUniqueConstraint:
            tableName: files_info
            constraintName: unique_user_id_name
        - addUniqueConstraint:
            constraintName: unique_user_id_folder_name
            tableName: files_info
            columnNames: user_id, folder, name