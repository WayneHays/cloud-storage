databaseChangeLog:
  - changeSet:
      id: add-used-space-to-users-table
      author: waynehays
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: used_space
                  type: BIGINT
                  defaultValue: "0"
                  constraints:
                    nullable: false
  - changeSet:
      id: populate-used-space-from-metadata
      author: waynehays
      changes:
        - sql:
            sql: >
              UPDATE users u
              SET used_space = COALESCE(
                (SELECT SUM(rm.size) FROM resource_metadata rm 
                 WHERE rm.user_id = u.id 
                 AND rm.type = 'FILE' 
                 AND rm.marked_for_deletion = false), 0
              )