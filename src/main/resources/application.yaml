spring:
  application:
    name: cloud-file-storage
  profiles:
    default: dev

streaming:
  buffer-size: 8192

cleanup:
  interval: 600

user:
  storage:
    default-limit-bytes: 104857600

multipart:
  limits:
    max-path-length: 500
    max-filename-length: 200

rate-limit:
  rules:
    - endpoint: "/api/files/upload"
      http-method: "POST"
      capacity: 60
      tokens-per-minute: 60
    - endpoint: "/api/files/download"
      http-method: "GET"
      capacity: 10
      tokens-per-minute: 10
  bucket-expiration-minutes: 10
