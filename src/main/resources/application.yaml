spring:
  application:
    name: cloud-file-storage
  profiles:
    default: dev

streaming:
  buffer-size: 8192

cleanup:
  interval: 10m

user:
  storage:
    default-limit: 100MB

multipart:
  limits:
    max-path-length: 500
    max-filename-length: 200

rate-limit:
  rules:
    - endpoint: "/api/files/upload"
      http-method: "POST"
      capacity: 60
      tokens-per-minute: 60
    - endpoint: "/api/files/download"
      http-method: "GET"
      capacity: 10
      tokens-per-minute: 10
  bucket-expiration: 5m

resilience4j:
  retry:
    instances:
      minioStorage:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - com.waynehays.cloudfilestorage.exception.ResourceStorageTransientException

